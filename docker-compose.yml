services:
  app:
    build: .
    container_name: agendamentos_app
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: agendamentos
      DB_USER: app
      DB_PASSWORD: app

  db:
    image: postgres:16-alpine
    container_name: agendamentos_db
    restart: always
    environment:
      POSTGRES_DB: agendamentos
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
