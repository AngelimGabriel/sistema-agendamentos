# Apache serve apenas a pasta public/. O restante do código (app/, config/...)
# fica fora do alcance do navegador, por segurança.
<VirtualHost *:80>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        # AllowOverride All habilita o .htaccess (regras de rewrite da aplicação).
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
